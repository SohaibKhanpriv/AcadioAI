services:
  # PostgreSQL with pgvector extension for vector similarity search
  postgres:
    image: pgvector/pgvector:pg16
    container_name: acadlo-postgres
    environment:
      POSTGRES_USER: acadlo
      POSTGRES_PASSWORD: acadlo_secret
      POSTGRES_DB: acadlo_ai
    networks:
      - acadlo-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acadlo -d acadlo_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Redis for job queue (prepared for future ARQ workers)
  redis:
    image: redis:7-alpine
    container_name: acadlo-redis
    networks:
      - acadlo-network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Acadlo AI Core API Service
  acadlo-ai-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acadlo-ai-core
    networks:
      - acadlo-network
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs  # Mount logs directory for persistent logging (US-AI-M3-E)
    environment:
      - SERVICE_NAME=acadlo-ai-core
      - SERVICE_VERSION=0.2.0
      - HTTP_PORT=8000
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://acadlo:acadlo_secret@postgres:5432/acadlo_ai
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - EMBEDDING_MODEL_NAME=text-embedding-3-small
      - LLM_PROVIDER=openai
      - LLM_DEFAULT_CHAT_MODEL=gpt-4o-mini
      - TUTOR_LLM_MODEL=${TUTOR_LLM_MODEL:-gpt-4o-mini}
      - LLM_TEMPERATURE=0.7
      - LLM_MAX_TOKENS=1000
      - MULTIMODAL_INGESTION_ENABLED=${MULTIMODAL_INGESTION_ENABLED:-true}
      - MULTIMODAL_VISION_MODEL=${MULTIMODAL_VISION_MODEL:-gpt-4o-mini}
      - MULTIMODAL_MAX_PDF_PAGES=${MULTIMODAL_MAX_PDF_PAGES:-120}
      - MULTIMODAL_PDF_RENDER_SCALE=${MULTIMODAL_PDF_RENDER_SCALE:-2.0}
      - MULTIMODAL_VISION_PAGES_PER_MINUTE=${MULTIMODAL_VISION_PAGES_PER_MINUTE:-20}
      - MULTIMODAL_VISION_RATE_LIMIT_RETRIES=${MULTIMODAL_VISION_RATE_LIMIT_RETRIES:-3}
      - MULTIMODAL_VISION_RETRY_BASE_SECONDS=${MULTIMODAL_VISION_RETRY_BASE_SECONDS:-1.0}
      - WORKER_MAX_JOBS=${WORKER_MAX_JOBS:-1}
      - WORKER_JOB_TIMEOUT_SECONDS=${WORKER_JOB_TIMEOUT_SECONDS:-1800}
      - WORKER_MAX_TRIES=${WORKER_MAX_TRIES:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ARQ Worker for background job processing
  acadlo-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acadlo-worker
    networks:
      - acadlo-network
    volumes:
      - ./logs:/app/logs  # Mount logs directory for persistent logging (US-AI-M3-E)
    command: ["python", "-m", "app.workers.run_worker"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://acadlo:acadlo_secret@postgres:5432/acadlo_ai
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - EMBEDDING_MODEL_NAME=text-embedding-3-small
      - LLM_PROVIDER=openai
      - LLM_DEFAULT_CHAT_MODEL=gpt-4o-mini
      - TUTOR_LLM_MODEL=${TUTOR_LLM_MODEL:-gpt-4o-mini}
      - LLM_TEMPERATURE=0.7
      - LLM_MAX_TOKENS=1000
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=50
      - MULTIMODAL_INGESTION_ENABLED=${MULTIMODAL_INGESTION_ENABLED:-true}
      - MULTIMODAL_VISION_MODEL=${MULTIMODAL_VISION_MODEL:-gpt-4o-mini}
      - MULTIMODAL_MAX_PDF_PAGES=${MULTIMODAL_MAX_PDF_PAGES:-120}
      - MULTIMODAL_PDF_RENDER_SCALE=${MULTIMODAL_PDF_RENDER_SCALE:-2.0}
      - MULTIMODAL_VISION_PAGES_PER_MINUTE=${MULTIMODAL_VISION_PAGES_PER_MINUTE:-20}
      - MULTIMODAL_VISION_RATE_LIMIT_RETRIES=${MULTIMODAL_VISION_RATE_LIMIT_RETRIES:-3}
      - MULTIMODAL_VISION_RETRY_BASE_SECONDS=${MULTIMODAL_VISION_RETRY_BASE_SECONDS:-1.0}
      - WORKER_MAX_JOBS=${WORKER_MAX_JOBS:-1}
      - WORKER_JOB_TIMEOUT_SECONDS=${WORKER_JOB_TIMEOUT_SECONDS:-1800}
      - WORKER_MAX_TRIES=${WORKER_MAX_TRIES:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Worker health check: verify it can connect to Redis
      test: ["CMD", "python", "-c", "import redis; redis.Redis.from_url('redis://redis:6379').ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:

networks:
  acadlo-network:
    driver: bridge
