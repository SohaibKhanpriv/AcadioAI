services:
  acadlo-ai-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE_URL: http://3.141.165.198:8000
    image: acadlo-ai-frontend:latest
    container_name: acadlo-ai-frontend
    restart: unless-stopped
    env_file:
      - .env.frontend
    environment:
      - NUXT_PUBLIC_API_BASE_URL=http://3.141.165.198:8000
    ports:
      - "3000:3000"
